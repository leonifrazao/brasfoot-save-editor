name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - ".github/workflows/frontend-ci.yml"

jobs:
  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Instalar Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Instalar dependências
        run: bun install

      - name: Rodar lint
        run: bun run eslint
